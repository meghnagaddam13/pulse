services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: pulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file: .env

  worker:
    build: ./backend
    command: celery -A app.core.celery worker --loglevel=info
    depends_on:
      - db
      - redis
    env_file: .env

  beat:
    build: ./backend
    command: celery -A app.core.celery beat --loglevel=info
    depends_on:
      - db
      - redis
    env_file: .env

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
